body:
  text: 傷風名義風本氣也靜則氣動則風亦猶靜則水動則波此氣分之則一陰一陽也而風之為陰為陽亦彰彰然皆可以不言而喻焉豈非與大地日月相終始者哉其使人為病也上下內外無所不至故素問云風為百病之始也爾後醫人崇信奉承以冠於方書辨證之首而坊間嬰兒不知其語之欠瑩亦能膾炙於口矣畢竟風者大氣激發之假名而四時外傷之前驅耳今推其風之為風者自是風中有寒而寒即風之帥也審辨深義以徵予言之非妄矣原夫夏之流輝也炎炎赫赫沙煎草焦矮屋湫隘如坐甑籠人皆將裸袒而解慍焉當是之時執扇持翣左颺右揮要有其風之透衣而少去鬱蒸之氣耳而況消暑滌煩戰葉鳴條微微拂拂自天上來者乎唐殿可以聊句陶窗足以高臥是雖此熱之甚而得風頻冷頻憩則果非寒而何若乃冬之猛威也凜凜冽冽雪深冰堅熊席狐裘如著鐵石人皆將密沉而擁爐焉當是之時塞牖下帷重衾溫食惟懼其風之過隙而多負晝光之暄耳而況呼地號天飛礫揚塵黯黯剪剪自云邊發者乎武卒可以墮指壯士足以悲吟是雖此寒之甚而得風愈嚴愈肅則果非寒而何嗚呼風寒之戕人也其害固有不可勝言者矣善哉張機猶似以輕重分風寒故首條揭出中風傷寒而其於取裁陰陽營衛三焦等尤為可惜焉至晉王叔和亦謂傷寒之病從風寒得之其後戴思恭徐汝元皆總謂之傷風寒然可指風為寒而不可寒為風矣以予觀之非時傷風呼為傷寒則與冬時名中寒者醫家所謂正傷寒也相混而呼中風亦與痱證誤為中風者相紊也或謂熱病素問寒疫張機傷寒論橫病孫思邈千金方汗病陳無擇三因方霜露之疾屠隆方苑此等命目猶未穩焉而況於傷寒上加正字或類字亦豈異於頭上安頭乎吾門通以傷風稱之實未敢必其當否矣蓋嘗思之風者四時常有之物而不可獨以春及肝木為之分配焉春夏秋冬之間動生凶邪沴氣而使其流行搗虛者則唯風勢也已凡人感召之初不必以疫呼之由病致死病氣死氣滿於一室無隙可避沿門闔境互釀之氣上攪蒼天清淨之氣下敗水土物產之氣人在其中親上親下長幼傳染相似謂之天行時疫或云天行時氣即是傷風中之一證也如素問所謂歲氣之說及虞愽固執少陽陽明為因者瑣屑支離終無認真此邦醫家以其輕者名時疫重者名傷寒病家亦從此言不可不改正焉夭疫之來自古有之故周禮方相氏儺以逐疫而孔夫子朝服亦不得已也夫人受疫素無定體必有表裡上下之差其邪之流脈自似有小大者大邪中強人則重而易治大邪中虛人則急而難治小邪中強人則輕而易治小邪中虛人則緩而難治若豆瘡者雖一奇邪亦當假風況乎痢疾痄腮麻疹水疱等病皆屬外邪而其實在風中矣蓋疫名分類繁文無要古今華人滔滔皆是約而言之則不出於瘍疫腫疫之二也又王叔和云中而即病者名曰傷寒不即病者其寒毒藏於肌膚至春為溫病至夏為暑病朱肱謂之晚發傷寒非也全是紙上空談決非實詣其誤肇於素問而與王海藏謂新邪喚出舊邪者一般若其寒毒延至秋冬則變生何病何證乎予未能預定其病機矣既而有沽名網利者曰某年某月當患某病某重而死某輕而愈湯藥一得偶中飾言要譽昧者稱奇妄誕欺人此良以道自任者之所憂也又八十一難以溫暑嵌在乎傷寒有五之中而沿習至今迴護分疏俗諺所謂一盲引眾盲籲遂無不與之俱陷溺者鮮矣近世稱瘟病者本就溫字或省水旁從疒曰瘟轉為疫病之義故有大頭瘟蝦蟆瘟瓜瓤瘟疙瘩瘟絞腸瘟軟腳瘟等證詳見於喻昌尚論篇又陳言云獄溫傷溫基溫廟溫社溫山溫海溫家溫灶溫歲溫天溫地溫等名愈多愈亂竟無要領皆杜撰之謬言而未切認其因也耳雖其立名異狀而要之本唯邪風耳所謂溫病亦春月之傷風而醫籍別立瘟疫一門非也若孫允賢合而論之先得我心之同然又中暑者煩悶卒倒及自汗口熱神思倦怠等證即中熱也史云暍是也仍為中寒相對之名而於風濕毫無與焉若夏暑冬寒犯之必中不犯不中譬猶火水犯之必得焚溺皆以非邪氣而為本時之令也張機所謂中暑皆是夏月傷風濕之證而渾與張潔古李杲輩之見奚擇哉又富貴安逸之人外苦炎燠內啖生冷多見怕熱腹痛吐瀉霍亂等候均是謂之中暑然其因不一尚有兼證則非真中暑也況有吳括蒼所謂冬天傷暑者乎凡自溫至熱自涼至寒自是春夏秋冬之序於其溫熱涼寒之外天常有陽熱地常有陰寒人皆居地而不居天則雖夏月亦當有寒濕之患何獨於四季十八日始見中濕者耶是以傷風中或有帶山嵐瘴氣者或有被雨露水濕者或有野狐精物亦乘虛以憑者雖然病名概之舉風之一字者則以其從外入內莫有專於此者也由是考之邪氣所中己亦不知暗襲潛侵若有若無而後隨見表裡諸證之類今之風疫比比而有然則初起無漉淅惡寒者四時通稱傷寒恐不允當故吾門姑以擬名傷風學者宜再思之六經辨解一元氣之在全軀也表裡上下璣旋輪轉其保續之者即水穀是也水穀入胃元氣併力腐熟之熏蒸之而其氣之淳精華滋者無處不到到於血分則赤變以生養其血到於液分則白變以生養其液皮肉筋骨亦能一本而陰陽之道行於其間此乃生生自然之天則也原夫背部為陽腹部為陰古今雷同之說未嘗有悛改者也以予觀之則其所取象似相違矣夫人南面而立則東西南可見而北獨不可見取之一身則左右前可見而後獨不可見是豈非腹部為陽背部為陰之明驗乎且人之一身總而言之則左右前後一氣貫之而血液相與活潑運行其所動者為陽故耳目口鼻必開於前胸腹肉薄近於胃府而蒸騰之氣輸也強矣譬諸春之相生也雖一草一木抽莩甲吐花蕊多自南以及北是老子所謂萬物之抱陽也其所靜者為陰故脊膂肩胛必峙於後背腰肉厚遠於胃府而蒸騰之氣輸也弱矣譬諸冬之相賊也雖高山深林隕霜雪改柯葉多自北以及南是老子所謂萬物之負陰也故語云君子不以言舉人不以人廢言非但老子之言雖出揚墨之口若其言之善者則猶可取焉耳大凡背者表氣易虛則初當觸風寒也而何為陽之部位耶腹者表氣難虛則初當逸風寒也而何為陰之部位耶若夫一切山精水怪陰分為之揚氛起焰而至於其陽分則盡莫不潛伏屏息矣不可妄別陰陽營衛以說風寒先入之事而腹背手足表氣不充則風寒乘虛襲入者此其必然也於是乎太陽少陽陽明太陰少陰厥陰手足十二經等說附之好運氣數學者而旁塗捷歧不可惑矣何者四象配四時則可言而配五藏則不足故言六氣水即太陰而謂之太陽寒水火即太陽而謂之少陰君火木未厥陰金何陽明加之任督二脈奇經六脈等名迂怪虛談愈出愈亂全非實際得力之論而無益乎醫事者也畢竟人身一經絡耳其中大經小絡條理秩然而上下內外左右支別殆不異乎老絲瓜之纏紐如織者也固無陰陽易位府藏倒置之理則不可每經有始終根結而止矣故風寒一日受之熱氣已成吾身之一統然則謂之傳足不傳手傷足不傷手而可乎抑又有別足保命之人則其身當無足六經而患風寒乎靈素作俑惑世誣民後來諸家局於見聞而不過持循講習於此耳惜哉戴思恭趙繼宗等一二人僅有所疑而終莫為之平反也予亦以其所久慣呼難猝勇革務為風寒類證之暗號也已有年矣然張機猶似詭遇獲會者焉況後世承其口氣從事於此而經無六經傳變之可言則其法不正其治多誤耳故予今不敢為牛後姑設淺深閉脫四證豈好辨哉予不得已也蓋倡明此道實乏其人即吾黨分處諸侯之國亦不免調高寡和反為俗人所嘲焉若以好辨之嫌而遂輟不言則因循苟且必不能自拔而日新也彌以振起家言刖君子其或不罪乎傷風大意風寒之傷人也背腹手足必無定規而華佗獨立風寒漸入之說者此為稍近理是故病證未見有單經挨次相傳者而況於李東垣王海藏所謂傳本巡越得度首尾等例乎劉草窗則謂傳足不傳手陶節庵則謂傷足不傷手均是五十步笑百步之類而殊不知人身本是一經絡也又吳綬所謂陽邪傳陰邪傳及虞博引至人傳云傳經專經即病郁病等各目亦皆可謂鑿且悖理矣夫人行住坐臥之間若正氣邪氣卒然豆湊直有正氣之所才蹶則邪氣乘之排衝散漫以見緩急輕重之候矣蓋傷風者須要明辨三證精察療體焉一曰經證此乃邪氣初入之門分而言之則有淺深二證也其淺證古謂之太陽病又與通體太陽不同非也此邪氣襲擊表氣而裡氣將憤激之時必見惡寒無汗頭痛脊強等候宜用峻發之劑即桂枝湯麻黃湯之類是也其深證古謂之少陽病或半表半裡非也此邪氣滾動表氣而裡氣已鬱蒸之時必見寒熱嘔吐耳聾脅痛等候宜用和解之劑即青龍湯茈胡湯之類是也二曰閉證古謂之陽明病或胃家實一曰脾約或曰入府非也此本元氣有餘之證而熱勢爚亂表氣逆聚裡氣則腸胃中之燥結者必見怕熱煩渴讝語發狂尿赤屎鞕等候宜投湯藥早以疏窕元氣之將閉者即白虎湯承氣湯之類是也譬如亢旱之燒空也時亦甘雨沛然一下則謁水之民解慍開顏忽至嘉潤再起桔苗矣三曰脫證古謂之太陰病少陰病厥陰病一曰傳經陰證或曰直中陰證非也此本元氣不足之證而熱勢減陷表氣攻奪裡氣則腸胃中之疲乏者必見目昏面煤舌卷囊縮厥冷自利等候宜投湯藥早以充張元氣之將脫者即理中湯四逆湯之類是也譬如勁兵之破壘也時亦救將憪然一走則罷散之卒崛起潰圍忽至凱旋再得糧道矣然脫證多是不治而其閉證間有可治者焉意其人之為體也一個殼子包著府藏若從殼子上論之則頭面手足腹背以至耳目鼻口皮肉筋骨皆是屬表而從近殼子處論則咽喉及膀胱腸中亦出表之路也其直稱里者五藏精神所居乃去殼子俱遠而不可令外邪深入耳故經證輕者為表之表必有憎風噴嚏面色光浮聲重鼻塞時流清涕者俗呼謂之冒風又云感冒即傷風中之至淺者也經證重者兼里之表多見咳痰嘔吐飲食難進自利秘結小水赤澀等一二證此不可妄謂邪氣入里也又閉證者里之表面熱之猛勢多是吐下通劑之可治者也又脫證者邪氣在內深窺奧室腸胃亦虛難吐難下絕無邪氣可驅之去路則難治之證自可知也喻昌一人已論此理頗近予之所嘗憶矣然則風寒最宜臨輕早治若非但諱病失宜反有賴藥侵風以得再感者也如夫近世之人不問長幼男女固有疝症為之加工何也府藏之間各有脂膜絡繹接遞而元氣血液融活透徹者此其人身內景之常資也若脂膜中間一生空氣聚散來去如雲如風或宿上則為噫嵌下則為屁全非腹裡固有之物潛消默化不復存跡有時怒張走痛無常就其形樣稱疝稱痞及瘕痃別名而實一物也又脂膜之外瘀汁垽濁日凝月積成症成癖隨其隙地形樣不一城狐社鼠不可妄攻皆是腹內禍胎之著且大者也當時府藏無恙反被元氣過化畏縮逋竄無復出頭既而邪氣中經腹氣多易震駭疝症乘勢左右上下支撐壓蕩敝障氣隧是以經證或有似閉證者或有似脫證者或脫證有似閉證者或閉證有似脫證者後人於此等處漫不加察治方一差暗伏危機邪氣縱使僥倖退舍荏苒時月遺熱損體漸成壞證夫壞證者多據醫藥誤治是王綸所謂傷藥之類也韓秪和以壞病別為一證用羊肉湯誤矣戴思恭謂壞傷寒亦名義不穩或變痢變腫有死者有生者或日夜久咳漏氣精血失所憑持肉削骨立惡寒晡熱自汗盜汗吐痰咯血有釀成勞瘵者豈可不慨嘆哉故有疝症蟲豸瘀血黴毒之人其勢內外環攻夾擊此非傷風本來之病則表裡上下俱見異狀名謂之黨證亦可又有兼癇證哮證及滯食宿酒者朱震亨云雜合邪戴思恭云夾食傷寒皆此之類也當由病家傍人詳問有他所害來路也否乎然後針灸藥石權以栽之則自無一定不變之弊也若欲從張機求如式見證雖歷數十人之多而恐首尾內外不相合焉殊不知望聞問切及腹背看法一概施治以托外邪實博者之孤注耳斯亦危矣今之患傷風者多系七分內傷三分外感是即內勢已成之後微邪扇動早以啟行者也故初病脈細數或腹皮急陷中央如弦或腹皮虛松臍下無力或手顫神倦畏寒喜暗或面唇青白閉目懶言皆是耽酒好內元氣虛憊之人又在目語額瞬旦夕名利之輩而醫家呼為挾虛傷寒或勞力感寒者亦此類也於是乎食養凡谷菜外雞卵鰻鱺海參干鰹鱒魚等物烹飪鹽梅不可乖方尤忌生冷泥滯即時難消者故古有食醫今委度外嗚呼世人何不悟耶保城為一良策不專以外邪為競主喻諸墨汁著染糊絹雖使湯浣速陰墨痕而紕薄絹地揉摩擦破遂為無用之棄物矣又傷風寒病多有咽膈生痰者必見咳喘乾嘔等證猶疝症郁窒所致焉其吐如墨如膿如破絮如桃膠如蜆肉然素問僅有咳涎嘔沫出青黃涕等語張機傷寒論亦稱涎沫不用痰字金匱要略已出痰飲二字全為腸間畜水而非近世所謂稀清為飲稠濁為痰者也晉時淡痰通用不為炎上之義至宋漸指口中所吐之物耳此古今之一疑城蓋古少而今多耶又孕婦傷風甚則為熱所動拒食嘔飲終至並胎俱斃必勿拘以重身反害其母有故無殞何可懼乎產後傷風多有兼證或惡露未盡少腹頻痛俗雲兒枕痛或蒸乳發熱或身見紫疹或經筋拘攣如痙狀者不可輕視以為常候也又在小兒則風寒易感易解而晉以來有謂變蒸者非斯乳食蟲癖之所致則傷風寒也豈復有此先彼後如一變生腎志二變生膀胱每變三十二日及暗變等之理乎後世謂八歲以下無傷寒者亦醫家妄言不足深責焉大凡風氣新解之後不欲飲食稀吐痰沫羸瘦蓐臥他無所苦研米粥時少吃至於粳飯嘔惡不納或死或復舊者極在蛔蟲積瘕之人熊膽黑丸可擇用之強用湯藥反助逆動不用而死雖用亦死須不治以待其自寧而可也又愈後向之傷處元氣猶未健行熟路逐旋因邪易入而有其綿夾單衣脫換不慎者則汗竅開泄非但再感或令邪風數次襲之而損虧元氣以隕軀命誠不可稍有疏虞矣否則口淡無味需物消間梳沐酒色只管犯禁有小才智不能自克食復或云發哺素問云病熱少愈食肉則復多食則遺此其禁也勞復又有女勞復者此非張機所謂陽易陰易之類比比皆然故古人云病加於小愈豈虛語哉靈素以來論風寒者或以衛營三焦牽合焉或以日數藥品決裂焉且駕合病並病再經過經兩感傳屬等說而其甚者則落乎馬宗素運氣無稽之術矣嗚呼詭計左道莫此為甚索治之人未有不因之而斃者也學者若能以意隅反類推則雜病等法亦思過半矣淺證治例凡經證淺者宜峻發不拘日數多少不憑時令寒暑惡寒惡風頭疼身痛腰脊俱強或發熱脈浮緊而無汗者頻進湯劑衣被厚覆早取津津微汗以嚴大過之戒一時間許周身相潤而目眥微黃者邪氣無不消散矣得汗之後氣爽脈靜必停後服當防再感素問所謂衰其大牟而止是也若汗多者用撲粉方汗後壯熱尤為凶候素問云陰陽交之類也其服汗劑人汗不出而風圍自解者亦間有之若一時強汗之致使如淋如洗則胃氣反馳之於表分而津液隨漏飲食隨減筋惕肉瞤臥起不安且恐卒然亡氣以見寒慄沉昏叉手冒心等證此非速用參薑湯或參附湯則元氣外去而不能內返也蓋桂麻二湯總驅外邪其中有少不同者如桂本為解肌不問有汗無汗必治惡風脈浮數者而麻則為惡寒無汗頭疼項強脈緊而喘者設焉桂麻服法各啜熱粥以助藥力可也何止桂乎陶華云春分後忌桂麻而以張潔古九味羌活湯代之者籲亦過矣其始出於韓龐輩謂張機之法宜於昔而不宜於今等語也凡怔忡短氣舌乾咽痛脈細數無力者不可任意發汗多是三分外感七分內傷宜與柴桂合劑及順氣加減方又表證初兼吐瀉者多在其人平素易下及滯食者不可妄謂邪氣入里也又表證一衄謂之紅汗衄乃解者不過少解其煩瞑未能解深入之邪若其邪有沉滯未盡者則早須用汗藥而免其再衄矣又冒風輕證宜生薑酒不飲酒人順氣劑外一味辣茄湯一味生薑湯連啜數甌汗流徹體亦良若邪入稍深則嚏止涕干伸欠不作頭痛頓退故有得是證者則為邪未深入若鳩尾之下左右有動氣者邪氣未解宜施治方病魔雖已消散汗孔尚然疏豁須在避風之處靜養三五日俟腠理致密特忌上廁便利室中宜用褻器惟以衣衾遮護肩項及膝為要病者汗後性急事冗起坐衣服不顧調節且侍養無人不言其非旋即衝風能致復感靈樞云避風如避矢石者此之謂也凡瘥後十數日或一月許終不惺惺者皆由疝症瘀血相礙相激而裡氣未得遽寧也又口唇發小瘡或身見風㾦㿔者餘熱解時間亦有之又病人雖大汗透寢具亦有一時而止者則反易解散不可必以濈濈微汗為度如夫近世所謂搐腳接汗火攻蒸法中寒之證臨機應焉桂枝湯桂枝二大圓匕芍藥同上生薑七分上三品以水二合煎取一合去滓頓服中病即止凡處劑之時邪氣易解者小潤其間難解者小促其間令藥勢相及耳予嘗有言此湯今去甘棗二種者本以桂皮中帶甘味也但偏嗜甘味者加甘棗亦無妨不問男女老幼多有疝症蛔蟲強用味甘者則恐胃中泥滯或間致嘔吐不食之患焉且如酒客病胸中滿逆則甘物不可用也麻黃湯麻黃二大匕桂枝同上杏仁七個上三品以水二合煎取一合去甘草加桂法生薑酒今時之人感冒必以姜酒取汗其法生薑擦爛酒浸溫服是即戴民恭為蠻法者孫對微呼謂之神仙粥也又此邦有呼為味噌酒者此比之生薑酒味和氣香尤為有驗其法味噌椒二品以擂盆能擂了放火燒鍋炒上二品入清酒三五盞以調和之者也一方主治老幼男女傷風輕證茯苓半夏芍藥桂枝厚朴橘皮甘草生薑上八品水二合煎取一合藿香葛根升麻隨證出入加減熱多加黃芩煩渴或咳去桂樸加果臝咽痛去桂枝加桔梗痰喘加紫酥子蘿蔔子杏仁枳實皂莢竹瀝類一二品小兒只小劑耳深證治例凡經證深者宜和解若自淺入深則里已近災未可宴然稱無病也今之傷風多見此證邪氣正氣排籠相持各無進退勝負苟非和解則難求成矣故後世趙繼宗論傷寒不必傳經者此為稍近理焉惜乎取用和解禁吐汗下三法其遺禍至今猶未息也元氣有餘者必變閉證元氣不足者必變脫證畢竟初起峻發不徹之為耳或寒熱痰咳耳聾脅痛或口苦舌乾不欲飲食或渴不渴嘔不嘔或胸中煩心下悸或舌苔白黃語聲嘶敗或每日如瘧狀脈自眩者即是和解之證宜用小柴胡湯其間隨證以消息之不可妄投大茈胡湯將閉之時此湯主之若寒熱不解喘咳乾嘔或心下有水氣者只宜和之以小青龍湯類若惡寒無汗加煩躁者即釀成閉證之時須用大青龍湯汗中兼折逼內熱勢矣蓋舍汗下吐藥之外均屬和解之劑乃令襲入之邪潛消嘿奪今時動輒有黨證虛證者必顧中氣以托外邪為佳如拒藥惡食者宜參薑湯送下黑丸凡淺深二證解後不了了者灸為善著膏肓痞根及背九俞以下至十四俞隨宜取以灼之又疝症氣逆手足易冷腹中急痛惡味苦者先灸足三里等兼用小建中湯若有嘔則非建中所宜也小茈胡湯茈胡半夏黃芩人參甘草生薑大茈胡湯茈胡黃芩芍藥半夏枳實大黃生薑大棗小青龍湯麻黃桂枝芍藥五味子半夏細辛乾薑甘草大青龍湯麻黃杏仁桂枝石膏甘草生薑小建中湯桂枝甘草生薑芍藥膠飴大棗一方大麥二大匕半夏茯苓各一大匕芍藥橘皮各中匕生薑七分上六品以水二合煎取一合凡傷風寒半解之後疝症伺隙以進其身故體疲脈小他無所苦惡食吐痰屎多為閟後世用補劑者宜以此方治之惟開胃散結則餘證自退耳有熱加芩有瀉去芍若拒藥汁者亦多無不消受焉閉證治例疏窕劑中白虎主煩渴承氣主燥屎此其大要也古人皆因脈證多辨裡熱里結而不如予之以手按腹直決疏窕矣何者先以手指重按病人腹皮其里有熱者如火烘炙透於指中而表熱者舉身有熱按處暫散也若夫里結必有裡熱硬糞多少阻住去路臍下底如著餅或如杏核雞卵狀者是也此證白虎承氣可用之無畏焉若熱勢漫無可御必有躁擾不寧則傷爛腸之裡麵皮理而圊血自瀉下也雖使許水亦新汲井中者頻與之無妨且欲飲一碗只與半碗常以不足為善不宜一飲而極意也遂令病人恣飲過度則為咳為喘為嘔為瀉為腫為悸為水畜疼為水結胸故後世所謂以水噀面澆身或置病人於水中等法皆是醫中之操霸術者歟又大渴讝語罵詈善惡不避親疏者宜以辰砂加入水中飲之西瓜梨漿糖水亦良其引飲者嫌冷喜熱多屬虛證不可妄投白虎湯類也或目赤眵凝舌苔焦黑甚則芒刺干裂如炭或口疳氣臭鼻如煙煤或紫斑赤疹爪甲色紅或上氣喘促煩渴狂言或棄衣揭被揚手擲足或逾牆上屋如見鬼狀或腋下掌心濈濈汗出或周身無汗劑頸而還或小水赤澀如紅莧汁或脈細數無力者死或遲緩或沉而有力有其上兼證者早議疏窕攻擊之法則十全之功可自得矣苟或當下而不下則熱毒隨亂劇津液隨枯豈可一以下藥宜遲為說乎然屢屢欲後而弩睜傷氣者則勿用承氣及大茈胡湯類先用紅夷所來導器急射溫蜜則腸中自得潤滑而燥屎因是易下諸證一時俱解張機蜜煎導法或近來香油導法亦可此邦今有做紅夷法以鍮銅造之者若無此器則未用煙管留其吸嘴刺入患人肛門三四分乃去大頭處稀蜜微溫加皂莢末口含用力直吹送之則津迴腸潤久積之物必盡出矣極良法也若堅滿曾無上廁之意則於腸之下際為燥屎未逼者是以蜜兌無益下藥為捷服後轉矢氣者仍以炒鹽燒塼並溫石能暖之亦同納夾絹袋於其病人腹上款款熨之則藥氣通透而屎自易便故下後神清氣爽身涼思食皆愈之兆如及腹滿身熱譫語不食睡臥不寧併發紫黑斑點此當汗不汗及已汗而熱不散當下不下及早下而熱乘虛之患也而粗工動輒不知病人稍涉虛證認其數日不更衣者妄投駛劑以致初硬後溏之證貽害非細甚可畏也一種閉中稀糞水自下者此結糞外之傍流而非胃虛腸虛之瀉即腸胃外之宿水偏滲於腸胃中而融化燥糞之外面者也故下物色焦放屁酸臭耳宜投小承氣加減方脈證既決又何難焉凡如此者多由誤治且諸所飲下者必曰先與小承氣則恐有大下傷人也又屎尿如常少腹硬痛其人喜忘者有畜血桃仁承氣湯類須量性稟施之又宿食凝痰胸中作苦惱者並宜吐之熊膽汁瓜蒂散淡鹽湯參蘆湯與之以指或雞翎探喉中即吐出也又伏飲之證與五苓散其人至於壞證煩渴漸為水脹須以吾門鯉魚煮汁治之若惡其臭味且不能多飲者竟非此物所能治也元氣強者宜十棗湯或大黃商陸芣苢通草牽牛子赤小豆等藥隨證擇用亦得有效又白睛黃者熱勢瀰漫將發身黃於五苓散方內加茵陳蒿或丹青樹葉則黃從尿去下也若皮膚薄縐茶褐色者多難治矣大凡腹中時滿時減或腹脹按之易軟或臍左右有動氣或小水清白數少或連日不食臍腹坦然無壅滯不通之狀者皆不可下也只戒其誅伐無過之害耳白虎湯石膏知母粳米甘草小承氣湯大黃厚朴枳實大承氣湯大黃厚朴枳實芒硝桃仁承氣湯大黃芒硝桃仁桂枝甘草五苓散茯苓豬苓術澤瀉桂枝十棗湯芫花甘遂大戟大棗脫證治例充張劑中四逆主厥冷理中主自利些其大要也詳言兼證或畏寒喜暗只懶見人或語聲輕微顏色青白或頭重手顫神倦氣怯或眼陷鼻笑舌卷囊縮凡兼如此數項生機尚存一線故舍灸及參附等更無他法當籍者但得手足漸溫自利隨止脈微出者乃可生也或反目上視瞪目直視或面煤唇紫爪甲青黑或屎尿失禁粒飲不入或拈衣摸床兩手撮空或閉目踡足啐啐不省或口唇顫搖頻嘔頻噦或氣喘痰潮脈細欲絕此即脫之死證或精神昏瞶頭面喜扇或無熱無渴舌結黑苔或膚冷脈道獨見熱勢或短氣淚出面腹虛滿或在婦人則產後日近乳縮股慄者皆是危篤之證不可治也凡瀉不但粥飲直出藥汁才吞入咽汩汩從腸奔下如箭者今用理中原不為過其水瀉之益劇者則須投五苓散及利水藥反利膀胱不化之氣譬猶通支河水道以御急奔之勢若小水淋澀兩足浮腫按之沒指甚可畏焉又戴思恭所謂利腸者挾熱自利糞色赤黃及下腸間津汁垢膩宜用順劑尤禁澀藥然至吳綬所謂漏底則元氣暴脫蚤以固腸為要否則轉氣趨下少腹自利漫無止期即桃花湯及赤石脂禹餘糧湯類可也又蛔厥者時煩時止未為死候烏梅黑丸諸殺蟲丸宜以參薑湯送下之若至胃中無穀氣則謂藏結亦同而不可治也又除中者元氣奔散將假穀氣急哺卒啜自取暫快耳若脈強數眼中無精彩而暗濁慘淡者則一圍元氣留連未斷為之少延殘喘必當屬纊以待斂矣四逆湯乾薑附子甘草理中湯人參術乾薑甘草桃花湯赤石脂乾薑粳米赤石脂禹餘糧湯赤石脂禹餘糧脈論脈者四診中之末而其言不竢贅也漢唐以來方書取其一舍其三而一又未明訛承掩藏不肯勇革是以本邦醫人亦皆移於浮辭可深嘆哉凡四診之於病機也彼此參伍不可欠一吾門於四診上非惟加之按腹候背手足看法且以鼻嗅知病人臭惡之氣此可謂詳補古今未言及之缺典者矣於是乎邪之淺深久近證之輕重緩急斷然無復可疑者也夫脈元是血氣活潑充灌之勢內非各開三口沸騰而出則一藏一府一陰一陽之患更無顯於兩手掌後之理而況有運氣支於分配假託之可言者乎何也有一病人於茲暗坐室中穴壁出手嘿然不謂形色性情試使歷幾醫人切其脈道而預以辨識何病何證者則予未之或聞也意其持脈即驗輕重生死之一事而絕無某病見某脈之定規也略可知矣先以中指探掌後高骨上為關得其關位然後齊下鹽禁二指若人臂長則疏排其指臂短則密排其指輕手得之曰舉重手得之曰按不重不輕委曲求之曰尋所謂三指停穩者自然之行也二指不足四指有餘仍執其中焉耳古不稱關總寓尺寸故素問似以中附為關位關之前去魚際為一寸而鹽指之所下因名曰寸關之後去尺澤為一尺而禁指之所下因名曰尺原其關名肇於八十一難此以三指揣按之次猶兩州畫首之設一門也又秦越人雖無明文而不主喉傍跗上獨取兩手掌後者其見卓矣蓋病脈之來多不單至然全屬大小浮沉遲數六脈而不大不小不浮不沉不遲不數調勻和緩意思欣欣難以名狀者謂之平脈故緊弦細伏促結等脈今之病者雖多有之亦無不自六脈而推焉其他華人妄立脈名圖形韻語以便記誦而鹵莽滅裂實不能自知者也就其分呼愈添蛇足皆使後人以啟好異之心矣方書論脈非但七表八里九道之謬名而如素問之鼓搏喘橫張機之惵卑榮章綱損縱橫逆順及奇經太素天和真藏關格妊娠五運六絕七獨等脈皆是無用餖飣不堪其煩也畢竟脈者惟察數與不數耳脈數俗呼謂之脈進即病進也殆可以一言蔽矣不問男女老幼不別外感內傷若指下脈數或兼見沉細則輕者必重重者必危危者必死甚可畏焉又有脈傍行者謂之反關或有一手反關者或有兩手反關者或有反關得病則順行復原位者至於其六脈之見則一也此得之於有生之初而不可必為病脈矣大概有證脈相符者有脈證相左者或元氣頓虛之證其初脈病也多或元氣漸虛之證其初脈病也少故後世舍三取一之人如夫脈之不始病者飄然自外而遂致篤證矣嗚呼學者朝研夕考翻悟前迷則可免乎連代沿習之歧蹊也

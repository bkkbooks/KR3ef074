front:
  text: 序大凡醫法在邇在易而求諸遠與難者皆素靈八十一難有以羈縻之而終不能使其出頭焉其所由來者漸矣豈唯一朝一夕之故也哉是以近代四方諸生未醫之前先學運氣六經而其已還鄉為醫之後至於診察病證辨識藥石則向之運氣六經遂為無用贅言譬如市中處女未嫁之前先習箏與三絃而其已結帨為嫁之後至於料理家務計算谷金則向之箏與三絃遂為無益間物何者張機亦不知其假名託言之為書遵守之珍藏之以唱陰陽六經之說惜哉功罪相等淄澠相混未免通此而礙彼之陋弊也晉王叔和撰次宋成無已始注其書一出而後至於今日天下倀倀然莫之能折衷是故方有執喻昌程應旄張思聰張璐輩又互論註腳欲務上於人迴護調停多屬剩語況其他涉龐雜者乎承平百年文化丕闡閩商吳舶競輸異典雖然學之不明術之不精皆坐吾人入耳出口未當徵諸其身故耳嗚呼養老慈幼之家欲為良手乎欲為庸工乎不可不自辨其志焉方今雖有世務相妨亦須破冗日相規切洗垢摩鈍以來新知然則臨疾處方才略機發各適其可固不待言此可以推類而通其餘矣竊又謂苦口叮嚀不止張機而諸子百家其勞亦巨焉則似乎未可全擯仟之也每就日用醫事之實稽之於古以取其則敢加鄙見著為一書題曰傷風約言雖使數十其卷帙數萬其紙葉傷風變狀豈能盡哉斯書言簡不用文采亦將懷挾隨身以防不虞也耳予也不肖日侍親闈口授面命僅了大義若二三同志不以予言為迂則庶乎向之所求不遠不難或有造端進步處也請其過約而不盡義者則指摘疵評明者審焉享保壬子正月八日椿庵後藤省仲介甫書
